services:
  traefik:
    image: traefik:v3.6
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:8000"
    ports:
      - "8000:8000"
    volumes:
      - ${DOCKER_SOCK:-/run/user/1000/docker.sock}:/var/run/docker.sock:ro

  frontend:
    build: ./frontend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`localhost`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  backend:
    build: ./backend
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sso_demo}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-sso_user}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-sso_pass}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET}
      - MICROSOFT_AUTHORITY=${MICROSOFT_AUTHORITY}
      - MICROSOFT_SCOPES=${MICROSOFT_SCOPES}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=http://localhost:8000
      - SPRING_DATA_REDIS_HOST=redis
      - APP_AUTH_IDENTITY_CONTRACT_MODE=${APP_AUTH_IDENTITY_CONTRACT_MODE:-LEGACY_ONLY}
      - APP_AUTH_JWT_MINT_MODE=${APP_AUTH_JWT_MINT_MODE:-legacy}
      - APP_AUTH_MICROSOFT_SERVER_SIDE_ENABLED=${APP_AUTH_MICROSOFT_SERVER_SIDE_ENABLED:-false}
      - APP_AUTH_MICROSOFT_CLIENT_SIDE_ENABLED=${APP_AUTH_MICROSOFT_CLIENT_SIDE_ENABLED:-false}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`localhost`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.routers.backend.priority=2"
      - "traefik.http.services.backend.loadbalancer.server.port=8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:8-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:18-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-sso_demo}
      - POSTGRES_USER=${POSTGRES_USER:-sso_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sso_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sso_user} -d ${POSTGRES_DB:-sso_demo}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
