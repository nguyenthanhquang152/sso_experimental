server:
  port: 8080
  servlet:
    context-path: /api
  forward-headers-strategy: framework

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sso_demo}
    username: ${SPRING_DATASOURCE_USERNAME:sso_user}
    password: ${SPRING_DATASOURCE_PASSWORD:sso_pass}
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:false}
    baseline-version: ${SPRING_FLYWAY_BASELINE_VERSION:1}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid, profile, email
          microsoft:
            provider: microsoft
            client-id: ${MICROSOFT_CLIENT_ID:disabled-microsoft-client-id}
            client-secret: ${MICROSOFT_CLIENT_SECRET:disabled-microsoft-client-secret}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: ${MICROSOFT_SCOPES:openid,profile,email}
        provider:
          microsoft:
            authorization-uri: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
            token-uri: https://login.microsoftonline.com/common/oauth2/v2.0/token
            jwk-set-uri: https://login.microsoftonline.com/common/discovery/v2.0/keys
            user-info-uri: https://graph.microsoft.com/oidc/userinfo
            user-name-attribute: sub

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
  frontend-url: ${FRONTEND_URL:http://localhost:8000}
  google-client-id: ${GOOGLE_CLIENT_ID}
  auth:
    identity-contract-mode: ${APP_AUTH_IDENTITY_CONTRACT_MODE:COMPATIBILITY}
    jwt-mint-mode: ${APP_AUTH_JWT_MINT_MODE:V2}
    microsoft:
      server-side-enabled: ${APP_AUTH_MICROSOFT_SERVER_SIDE_ENABLED:false}
      client-side-enabled: ${APP_AUTH_MICROSOFT_CLIENT_SIDE_ENABLED:false}
    google:
      client-side-enabled: ${APP_AUTH_GOOGLE_CLIENT_SIDE_ENABLED:true}
      server-side-enabled: ${APP_AUTH_GOOGLE_SERVER_SIDE_ENABLED:true}
  microsoft:
    client-id: ${MICROSOFT_CLIENT_ID:}
    client-secret: ${MICROSOFT_CLIENT_SECRET:}
    authority: ${MICROSOFT_AUTHORITY:https://login.microsoftonline.com/common/v2.0}
    scopes: ${MICROSOFT_SCOPES:openid,profile,email}
