server:
  port: 8080
  servlet:
    context-path: /api

spring:
  profiles:
    active: test
  flyway:
    enabled: false
    baseline-on-migrate: false
    baseline-version: 1
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret
            scope: openid, profile, email
          microsoft:
            provider: microsoft
            client-id: ${MICROSOFT_CLIENT_ID:disabled-microsoft-client-id}
            client-secret: ${MICROSOFT_CLIENT_SECRET:disabled-microsoft-client-secret}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: ${MICROSOFT_SCOPES:openid,profile,email}
        provider:
          microsoft:
            authorization-uri: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
            token-uri: https://login.microsoftonline.com/common/oauth2/v2.0/token
            jwk-set-uri: https://login.microsoftonline.com/common/discovery/v2.0/keys
            user-info-uri: https://graph.microsoft.com/oidc/userinfo
            user-name-attribute: sub

app:
  jwt:
    secret: test-secret-key-that-is-at-least-32-characters-long-for-hmac
    expiration-ms: 86400000
  frontend-url: http://localhost:3000
  google-client-id: test-client-id
  auth:
    identity-contract-mode: COMPATIBILITY
    jwt-mint-mode: V2
    microsoft:
      server-side-enabled: false
      client-side-enabled: false
  microsoft:
    client-id:
    client-secret:
    authority: https://login.microsoftonline.com/common/v2.0
    scopes: openid,profile,email
