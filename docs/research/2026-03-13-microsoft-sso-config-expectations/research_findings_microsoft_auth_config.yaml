patterns_found:
  - category: "configuration"
    pattern: "Public Microsoft authority is modeled as `common/v2.0` in docs/tests, with tenant-specific issuer validation happening after token receipt."
    description: "The project repeatedly treats `common` as the browser-facing/interactive entry authority rather than the final token issuer."
    examples:
      - file: "docs/guides/microsoft-sso-integration.md"
        location: "docs/guides/microsoft-sso-integration.md:60"
        snippet: "\"authority\": \"https://login.microsoftonline.com/common/v2.0\""
      - file: "ProviderConfigControllerTest.java"
        location: "backend/src/test/java/com/demo/sso/controller/ProviderConfigControllerTest.java:48"
        snippet: "microsoft.setAuthority(\"https://login.microsoftonline.com/common/v2.0\");"
      - file: "homepage.spec.ts"
        location: "frontend/tests/e2e/homepage.spec.ts:79"
        snippet: "authority: 'https://login.microsoftonline.com/common/v2.0'"
    prevalence: "common"

  - category: "supported_accounts"
    pattern: "Repository design targets personal Microsoft accounts plus organizational member/home-tenant accounts, while explicitly rejecting guest/B2B identities."
    description: "The strongest statement of intended support lives in the design spec; developer docs and tests align on guest/external rejection but do not fully test consumer-tenant success cases."
    examples:
      - file: "2026-03-13-microsoft-sso-design.md"
        location: "docs/specs/2026-03-13-microsoft-sso-design.md:206-docs/specs/2026-03-13-microsoft-sso-design.md:218"
        snippet: "configure the application as a multi-tenant app supporting both personal and organizational accounts"
      - file: "ProviderIdentityNormalizerTest.java"
        location: "backend/src/test/java/com/demo/sso/service/ProviderIdentityNormalizerTest.java:54-backend/src/test/java/com/demo/sso/service/ProviderIdentityNormalizerTest.java:70"
        snippet: "rejectsGuestStyleIdentifiers ... rejectsExternalIdentityProviders"
    prevalence: "common"

  - category: "runtime_propagation"
    pattern: "Root env values flow directly into Docker Compose, backend config, and the frontend-facing provider payload."
    description: "A local authority override in `.env` is not isolated; it propagates all the way to `/auth/providers` for client-side login initialization."
    examples:
      - file: ".env"
        location: ".env:14"
        snippet: "MICROSOFT_AUTHORITY=https://login.microsoftonline.com/{tenant-id}/v2.0"
      - file: "docker-compose.yml"
        location: "docker-compose.yml:32"
        snippet: "- MICROSOFT_AUTHORITY=${MICROSOFT_AUTHORITY}"
      - file: "application.yml"
        location: "backend/src/main/resources/application.yml:52"
        snippet: "authority: ${MICROSOFT_AUTHORITY:https://login.microsoftonline.com/common/v2.0}"
    prevalence: "common"

