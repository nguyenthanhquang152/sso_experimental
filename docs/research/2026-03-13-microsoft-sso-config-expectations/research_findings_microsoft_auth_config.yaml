plan_id: "2026-03-13-microsoft-sso-config-expectations"
objective: "Investigate Microsoft SSO configuration expectations across docs, env, compose, and tests; determine expected account-type/tenant/authority behavior and whether current .env values contradict it."
focus_area: "microsoft_auth_config"
created_at: "2026-03-13"
created_by: "GitHub Copilot (GPT-5.4)"
status: "completed"

tldr: |
  - The repository’s docs and tests consistently expect Microsoft sign-in to use the public authority `https://login.microsoftonline.com/common/v2.0` as the interactive/browser-facing authority while validating final ID-token issuers against tenant-specific `https://login.microsoftonline.com/{tid}/v2.0` values.
  - The design/spec docs explicitly target a multi-tenant Microsoft app that supports personal Microsoft accounts plus organizational member/home-tenant accounts, while rejecting guest/B2B identities.
  - The current root `.env` enables Microsoft and pins `MICROSOFT_AUTHORITY` to a single tenant-specific authority (`.../{tenant-id}/v2.0`), which conflicts with the documented/tested `common` authority expectation and would be surfaced to the frontend through `/auth/providers`.
  - The repository does not contain Azure portal metadata, so the actual app-registration “supported account types” setting cannot be verified from source alone; however, if the registration is still single-tenant, it would also contradict the documented multi-tenant requirement.

