patterns_found:
	- category: "structure"
		pattern: "Current-user data is owned by `useAuth`"
		description: "The SPA centralizes authenticated user loading inside `useAuth`, which reads the JWT from localStorage and fetches `/user/me` once a token exists."
		examples:
			- file: "frontend/src/hooks/useAuth.ts"
				location: "frontend/src/hooks/useAuth.ts:14-47"
				snippet: "apiFetch<UserProfile>('/user/me').then(setUser)"
		prevalence: "common"
	- category: "architecture"
		pattern: "Avatar rendering is isolated to the dashboard"
		description: "The home page mounts login components and redirects, while `DashboardPage` is the only frontend location that renders `user.pictureUrl`."
		examples:
			- file: "frontend/src/pages/DashboardPage.tsx"
				location: "frontend/src/pages/DashboardPage.tsx:38-45"
				snippet: "{user.pictureUrl && (<img src={user.pictureUrl} ... />)}"
			- file: "frontend/src/pages/HomePage.tsx"
				location: "frontend/src/pages/HomePage.tsx:50-92"
				snippet: "Home page render contains login cards only; no current-user avatar or profile display"
		prevalence: "common"
	- category: "error_handling"
		pattern: "Missing avatar is silently tolerated"
		description: "Dashboard rendering simply omits the `<img>` when `pictureUrl` is falsy; tests also mock `pictureUrl: null` without treating it as an error."
		examples:
			- file: "frontend/src/pages/DashboardPage.tsx"
				location: "frontend/src/pages/DashboardPage.tsx:38"
				snippet: "{user.pictureUrl && (...)}"
			- file: "frontend/tests/e2e/logout.spec.ts"
				location: "frontend/tests/e2e/logout.spec.ts:13"
				snippet: "pictureUrl: null"
		prevalence: "common"
	- category: "architecture"
		pattern: "Microsoft avatar population depends on a single claim"
		description: "Both Microsoft flows normalize identity through `normalizeMicrosoftClaims`, which reads only the `picture` claim for avatar data."
		examples:
			- file: "backend/src/main/java/com/demo/sso/service/ProviderIdentityNormalizer.java"
