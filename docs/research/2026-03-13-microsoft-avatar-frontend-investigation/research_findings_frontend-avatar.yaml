	- question: "If Microsoft does not provide `picture` in the token, should avatar support come from a separate backend fetch rather than token claims?"
		context: "No code in this repository performs a secondary Microsoft photo lookup, yet the UI is prepared to show an avatar when `pictureUrl` exists."

