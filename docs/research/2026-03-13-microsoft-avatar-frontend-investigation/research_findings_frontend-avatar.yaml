related_conventions:
	naming_patterns_in_domain: "Avatar/profile image is consistently named `pictureUrl` in persisted user data and frontend consumption. Provider runtime config uses separate `ProviderConfig` types and does not mix with current-user types."
	structure_of_domain: "Login bootstrap concerns are separated from authenticated profile rendering: provider config in `useProviderConfig`, auth state in `useAuth`, login UI in `HomePage` and provider components, profile display in `DashboardPage`."
	error_handling_in_domain: "If `/user/me` fails, `useAuth` logs out the user. Missing avatar is not treated as an error; the UI simply hides the image element."
	testing_in_domain: "Frontend E2E tests mock `/api/user/me` directly and allow `pictureUrl: null`; backend tests validate Microsoft login without requiring picture data."
	documentation_in_domain: "Microsoft integration doc documents scopes and login flows, but does not document any explicit avatar/photo retrieval path beyond token normalization."

