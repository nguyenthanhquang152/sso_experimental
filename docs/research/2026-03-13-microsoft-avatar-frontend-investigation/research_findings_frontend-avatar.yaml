plan_id: "2026-03-13-microsoft-avatar-frontend-investigation"
objective: "Investigate why avatar is missing after Microsoft SSO, with focus on frontend current-user fetch, types, rendering, and data contract boundaries"
focus_area: "frontend-avatar"
created_at: "2026-03-13"
created_by: "GitHub Copilot GPT-5.4"
status: "completed"

tldr: |
	- The frontend currently expects an avatar in `user.pictureUrl`, fetched from `GET /user/me` inside `useAuth` and rendered only on `DashboardPage`.
	- `HomePage` does not render any current-user profile data; avatar display is limited to `DashboardPage`, where the `<img>` is omitted when `user.pictureUrl` is falsy.
	- The backend `/user/me` response includes `pictureUrl`, so there is no frontend/backend field-name mismatch in the current contract.
	- Microsoft identity normalization populates avatar data only from a `picture` claim, and the Microsoft integration tests explicitly exercise `null` avatar values, which supports the hypothesis that Microsoft logins often persist an empty `pictureUrl`.
	- Within the current frontend code, the smallest possible UI-side mitigation would be to add a fallback avatar or initials on `DashboardPage`; no evidence shows a frontend fetch or typing bug preventing avatar rendering when `pictureUrl` is present.

