plan_id: 2026-03-13-microsoft-server-side-unauthorized
objective: >-
  Investigate why clicking Microsoft server-side login returns {"error":"Unauthorized"}
  in the backend Spring Security OAuth2 path, determine the exact root cause, and
  identify the minimal backend fix.
focus_area: backend-microsoft-server-side-sso
created_at: 2026-03-13T00:00:00Z
created_by: GitHub Copilot
status: completed

tldr: |
  - The Microsoft server-side route is exposed and allowed through Spring Security, but the backend never defines a Spring OAuth2 client registration for `microsoft`; `application.yml` only registers `google` under `spring.security.oauth2.client.registration` while Microsoft values live separately under `app.microsoft.*`.
  - Because the route `/api/oauth2/authorization/microsoft` is still permitted and the global authentication entry point returns JSON 401, a Microsoft authorize request that cannot resolve a client registration surfaces to the user as `{"error":"Unauthorized"}` instead of starting OAuth.
  - The homepage can still show the Microsoft server-side button because `GET /auth/providers` computes `microsoft.serverSideEnabled` from rollout flags plus `MicrosoftAuthProperties.isConfigured()`, and that helper only requires `clientId` + `authority`, not a real Spring client registration or server-side `clientSecret`.
  - Even after adding the missing client registration, the current callback path is still Google-shaped: `SecurityConfig` wires only a generic success handler, and `OAuth2SuccessHandler` assumes Google claims (`email_verified`, `sub`, `email`) and mints `NormalizedIdentity.google(...)`.
  - Existing tests cover Microsoft-disabled behavior and generic filter wiring, but I found no enabled Microsoft server-side integration coverage; that gap likely allowed the broken authorize path to ship.

