patterns_found:
  - category: architecture
    pattern: Route reserved before provider exists
    description: >-
      The backend reserves `/oauth2/authorization/microsoft` through filter-chain matchers and a gate filter,
      but the actual Spring OAuth2 client/provider configuration for `microsoft` is absent.
    examples:
      - file: backend/src/main/java/com/demo/sso/config/SecurityConfig.java
        location: 39-58
        snippet: |
          .requestMatchers(
              "/oauth2/**",
              "/login/oauth2/**",
              "/auth/**"
          ).permitAll()
          ...
          .addFilterBefore(microsoftAuthorizationGateFilter, OAuth2AuthorizationRequestRedirectFilter.class)
      - file: backend/src/main/resources/application.yml
        location: 31-34
        snippet: |
          registration:
            google:
              client-id: ${GOOGLE_CLIENT_ID}
              client-secret: ${GOOGLE_CLIENT_SECRET}
    prevalence: common

  - category: structure
    pattern: Runtime provider metadata uses app-level public config, not Spring OAuth registration state
    description: >-
      The frontend-facing `/auth/providers` payload derives Microsoft enablement from rollout flags plus
      `MicrosoftAuthProperties.isConfigured()`, which only checks `clientId` and `authority`.
    examples:
      - file: backend/src/main/java/com/demo/sso/controller/ProviderConfigController.java
        location: 35-47
        snippet: |
          boolean microsoftConfigured = microsoftAuthProperties.isConfigured();
          boolean microsoftServerSideEnabled = rolloutProperties.getMicrosoft().isServerSideEnabled() && microsoftConfigured;
          ...
          microsoft.put("serverSideEnabled", microsoftServerSideEnabled);
      - file: backend/src/main/java/com/demo/sso/config/MicrosoftAuthProperties.java
        location: 49-51
        snippet: |
          public boolean isConfigured() {
              return clientId != null && !clientId.isBlank()
                  && authority != null && !authority.isBlank();
          }
    prevalence: common

  - category: error_handling
    pattern: Global JSON 401 masks OAuth2 misconfiguration as generic unauthorized
    description: >-
      The filter chain returns a fixed JSON 401 response for authentication failures, which makes
      missing/invalid OAuth2 authorize setup appear as `{"error":"Unauthorized"}`.
    examples:
      - file: backend/src/main/java/com/demo/sso/config/SecurityConfig.java
        location: 47-54
        snippet: |
          .oauth2Login(oauth2 -> oauth2
              .successHandler(oAuth2SuccessHandler)
          )
          .exceptionHandling(ex -> ex
              .authenticationEntryPoint((request, response, authException) -> {
                  response.setStatus(HttpServletResponse.SC_UNAUTHORIZED);
                  response.setContentType("application/json");
                  response.getWriter().write("{\"error\":\"Unauthorized\"}");
              })
          )
    prevalence: common

  - category: architecture
    pattern: Server-side callback implementation remains Google-specific
    description: >-
      Successful OAuth2 logins are handled by code that assumes Google claim names and builds a Google identity,
      so Microsoft server-side callback parity is not yet implemented in the current source.
    examples:
      - file: backend/src/main/java/com/demo/sso/service/OAuth2SuccessHandler.java
        location: 45-65
        snippet: |
          Boolean emailVerified = oAuth2User.getAttribute("email_verified");
          ...
          String googleId = oAuth2User.getAttribute("sub");
          String email = oAuth2User.getAttribute("email");
          ...
          User user = userService.findOrCreateUser(
              NormalizedIdentity.google(googleId, email, name, picture, AuthFlow.SERVER_SIDE)
          );
    prevalence: common

  - category: testing
    pattern: Microsoft server-side tests cover disabled gating, not enabled end-to-end authorize flow
    description: >-
      Existing tests validate the disabled contract and filter pass-through, but not a real enabled Microsoft
      authorize request backed by Spring client registration.
    examples:
      - file: backend/src/test/java/com/demo/sso/controller/ControllerIntegrationTest.java
        location: 291-294
        snippet: |
          mockMvc.perform(get("/oauth2/authorization/microsoft"))
              .andExpect(status().isServiceUnavailable())
              .andExpect(content().json("{\"error\":\"Microsoft server-side login is disabled\"}"));
      - file: backend/src/test/java/com/demo/sso/config/MicrosoftAuthorizationGateFilterTest.java
        location: 58-76
        snippet: |
          when(request.getRequestURI()).thenReturn("/oauth2/authorization/microsoft");
          ...
          verify(filterChain).doFilter(request, response);
    prevalence: occasional

