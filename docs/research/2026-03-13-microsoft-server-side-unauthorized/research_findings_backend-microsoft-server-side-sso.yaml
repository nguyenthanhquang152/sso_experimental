open_questions:
  - question: What exact Spring exception class is thrown on the current enabled `/oauth2/authorization/microsoft` path?
    context: >-
      The line-cited source strongly indicates a missing client registration and a fall-through into the global 401 entry point,
      but I did not run a live request with Microsoft rollout enabled and credentials present.
  - question: Should the runtime provider contract consider Microsoft server-side "enabled" only when `clientSecret` and a Spring client registration are present?
    context: >-
      Current provider enablement is based on `clientId` + `authority`, while the docs state `MICROSOFT_CLIENT_SECRET`
      is required for the server-side flow.

